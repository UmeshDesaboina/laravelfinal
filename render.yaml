services:
  - type: web
    name: fightwisdom
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        fromService:
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: fightwisdom-db
          property: connectionString
    healthCheckPath: /
